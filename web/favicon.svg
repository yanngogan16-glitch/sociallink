<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E27A"/>
      <stop offset="100%" stop-color="#9A7B1C"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="#0A0A0A" />
  <circle cx="64" cy="64" r="50" fill="url(#goldGrad)" filter="url(#glow)" />

  <text x="64" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900" fill="#0A0A0A" letter-spacing="-3">SLK</text>

  <circle cx="64" cy="64" r="44" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="4" />
</svg>
